<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CSR in Sport Diagnostic Tool</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

  <div class="brandBar">

    <div class="brandName">
      Sportz Village Foundation
    </div>

  </div>

    <!-- LANDING SCREEN -->

    <div id="landingScreen" class="hero">

  <h1>
    CSR in Sport Diagnostic Tool
  </h1>

  <p>
    Explore how sport can support and strengthen your CSR priorities.
  </p>

  <p class="subtext">
    In under 5 minutes, discover sport-based approaches aligned to your organization's CSR priorities and investment goals.
  </p>

  <div class="leadForm">

    <input
      type="text"
      id="leadName"
      placeholder="Name*"
      required
    >

    <input
      type="text"
      id="leadOrganization"
      placeholder="Organization*"
      required
    >

    <input
      type="email"
      id="leadEmail"
      placeholder="Email*"
      required
    >

    <input
      type="text"
      id="leadDesignation"
      placeholder="Designation"
    >

    <input
      type="text"
      id="leadPhone"
      placeholder="Phone Number"
    >

  </div>

  <button id="startBtn">
    Start Assessment
  </button>
      
    </div>


    <!-- QUESTION SCREEN -->

    <div id="questionScreen" class="hero hidden">

      <div class="progressWrapper">

        <div id="progressBar"></div>

      </div>

      <div id="progressText"></div>

      <h2 id="questionTitle"></h2>

      <div id="optionsContainer" class="options"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
